<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>wolke — Digitaler Assistent der Universität Osnabrück</title>
    <style>
      html, body { margin: 0; height: 100%; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; background: #fff; color: #18181b; }
      .cb-skip { position: absolute; left: -999px; top: 0; background: #a6093d; color: #fff; padding: 8px 14px; border-radius: 0 0 8px 0; z-index: 10; }
      .cb-skip:focus { left: 0; }
      header { padding: 20px 28px; border-bottom: 1px solid #e2e2e5; }
      h1 { font-size: 20px; margin: 0; }
      main { max-width: 720px; margin: 0 auto; padding: 24px 16px; }
      #mount { height: min(72vh, 640px); }
    </style>
  </head>
  <body>
    <!-- Standalone page obligations (docs/05 §9): title, one h1, main landmark, skip link, lang -->
    <a class="cb-skip" href="#main">Zum Inhalt springen</a>
    <header><h1>wolke — Digitaler Assistent</h1></header>
    <main id="main">
      <div id="mount"></div>
    </main>
    <script type="module">
      import { mount } from "/src/index.ts";
      mount({ botId: "echo", mode: "standalone", mount: document.getElementById("mount") }).then((w) => {
        window.__widget = w;
        document.body.dataset.ready = "1";
      });
    </script>
  </body>
</html>
