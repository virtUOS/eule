# Static serving for the widget bundle. Content-Type for .js is application/javascript
# by nginx default. widget.js is safe to cache hard once you serve it under a versioned
# path (see docs/07); at the root path we keep a short TTL so `latest` updates propagate.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    gzip on;
    gzip_types application/javascript text/html;

    # Versioned assets (e.g. /1.4.2/widget.js) are immutable → cache forever.
    location ~ ^/\d+\.\d+\.\d+/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Root widget.js / standalone page → short TTL so a rolling update is picked up.
    location / {
        add_header Cache-Control "public, max-age=300";
        try_files $uri =404;
    }
}
