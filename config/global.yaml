version: 1

# base_url / mcp_servers.url / auth.jwks_url point at EXTERNAL services (vLLM, MCP,
# Keycloak) that run elsewhere — see docs/07-deployment.md for a filled-in example.
# Only the *_env fields are secrets (values in .env, never committed).
model_providers:
  default:
    base_url: "http://vllm:8000/v1"
    api_key_env: "VLLM_API_KEY"          # secret by ENV NAME (never a value)
    default_model: "llama-3.3-70b-instruct"
    timeout_s: 60
    max_retries: 2
  fast-small:
    base_url: "http://vllm-small:8000/v1"
    api_key_env: "VLLM_SMALL_API_KEY"
    default_model: "llama-3.1-8b-instruct"
    timeout_s: 30
  # askUOS (docs/08 Scenario 3, BUILD_PLAN 9a): a whole specialised bot behind an
  # OpenAI-compatible endpoint — the gateway consumes it exactly like vLLM. The
  # model name is cosmetic to askUOS; the generous timeout covers its web-search/
  # crawl turns. Static API key = one of askUOS's API_KEYS entries.
  askuos:
    base_url: "https://askuos.example.invalid/v1"     # PLACEHOLDER — set to the real URL
    api_key_env: "ASKUOS_API_KEY"
    default_model: "askUOS-agent"
    timeout_s: 120
    max_retries: 1

mcp_servers:
  # Reference: the Osnabrück docs MCP server (uos_search / uos_fetch) used by the
  # it-helpdesk bot. Point `url` at your real server and set the bearer token in .env.
  uos-docs:
    transport: "streamable-http"
    url: "https://mcp-uos-docs.example.invalid/mcp"   # PLACEHOLDER — set to the real URL
    timeout_s: 30
    bearer_token_env: "UOS_DOCS_MCP_TOKEN"

# Keycloak OIDC — required once any bot sets requires_auth (validation check 5).
# These are deployment config (issuer/JWKS URL/audience), not secrets.
auth:
  issuer: "https://sso.uni-osnabrueck.de/realms/university"
  jwks_url: "https://sso.uni-osnabrueck.de/realms/university/protocol/openid-connect/certs"
  audience: "chatbots"
  leeway_s: 30

defaults:
  session_ttl_s: 7200  # 120 min (survive-reload persistence, BUILD_PLAN step 7)
  max_message_chars: 4000
  history_max_turns: 20
  rate_limit:
    anonymous:     { requests_per_min: 15, requests_per_day: 300 }
    authenticated: { requests_per_min: 60 }
  guard: { enabled: false }
  greeting: { mode: "client_initiated" }

# Global-only (NOT per-bot overridable).
streaming: { heartbeat_s: 15 }

# Deployment default theme = wolke design system. External clients override same keys.
theme:
  dark_mode: "auto"              # auto (prefers-color-scheme) | light | dark
  light:
    "--bg": "#ffffff"
    "--surface": "#f4f4f5"
    "--surface-2": "#ececee"
    "--border": "#e2e2e5"
    "--text": "#18181b"
    "--text-muted": "#6b6b70"
    "--primary": "#a6093d"
    "--primary-hover": "#8a0732"
    "--accent": "#f2c879"        # decorative eyebrow glyph only (exempt from contrast)
    "--on-primary": "#ffffff"
  dark:
    "--bg": "#161618"
    "--surface": "#1e1e21"
    "--surface-2": "#27272b"
    "--border": "#34343a"
    "--text": "#f4f4f5"
    "--text-muted": "#9a9aa1"
    # wolke's #c2355c is only 3.41:1 on the dark --bg (fails the check-9 4.5:1 link/chip
    # contract). Lightened to #d95c7d (4.97:1) — contract wins over the mockup token
    # (CLAUDE.md design rules). Confirm with the wolke designer.
    "--primary": "#d95c7d"
    "--primary-hover": "#c2355c"
    "--accent": "#f2c879"
    "--on-primary": "#ffffff"
  radius:
    "--radius-panel": "22px"
    "--radius-card": "12px"
    "--radius-bubble": "14px"
    "--radius-input": "12px"
    "--radius-send": "14px"
