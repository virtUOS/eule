name: CI

on:
  push:
  pull_request:

jobs:
  gateway:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway
    env:
      # Dummy secret values so config validation (check 3) passes in CI. No real
      # secrets are needed — these bots don't call out during tests.
      VLLM_API_KEY: ci-dummy
      VLLM_SMALL_API_KEY: ci-dummy
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
      - run: uv venv --python 3.12
      - run: uv pip install -e ".[dev]"
      - name: Type check (mypy --strict)
        run: uv run mypy --strict app
      - name: Tests (with coverage)
        run: uv run pytest -q --cov
      - name: Validate config (no boot)
        run: uv run python -m app.cli validate-config ../config/

  widget:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: widget
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: npm
          cache-dependency-path: widget/package-lock.json
      - run: npm ci
      - name: Type check (tsc --strict)
        run: npm run typecheck
      - name: Unit tests (Vitest, with coverage)
        run: npm run test:coverage
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Accessibility + keyboard (Playwright + axe, T10-A/B)
        run: npm run test:a11y

  docker-build:
    runs-on: ubuntu-latest
    needs: [gateway, widget]
    permissions:
      contents: read
      packages: write   # push to ghcr.io
    env:
      REGISTRY: ghcr.io
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      # Only publish on branch pushes — not on PRs (fork PRs get no write token, and
      # PR builds should not publish images). PRs still build via the matrix below.
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (and push on branch pushes) gateway
        uses: docker/build-push-action@v7
        with:
          context: ./gateway
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/gateway:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}/gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build (and push on branch pushes) widget
        uses: docker/build-push-action@v7
        with:
          context: ./widget
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/widget:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ github.repository }}/widget:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
