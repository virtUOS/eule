name: CI

on:
  push:
  pull_request:

jobs:
  gateway:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway
    env:
      # Dummy secret values so config validation (check 3) passes in CI. No real
      # secrets are needed — these bots don't call out during tests.
      VLLM_API_KEY: ci-dummy
      VLLM_SMALL_API_KEY: ci-dummy
      ASKUOS_API_KEY: ci-dummy
      UOS_DOCS_MCP_TOKEN: ci-dummy
      UOS_HELPDESK_MCP_TOKEN: ci-dummy
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v9.0.0
        with:
          enable-cache: true
      - run: uv venv --python 3.12
      - run: uv pip install -e ".[dev]"
      - name: Type check (mypy --strict)
        run: uv run mypy --strict app
      - name: Tests (with coverage)
        run: uv run pytest -q --cov
      - name: Validate config (no boot)
        run: uv run python -m app.cli validate-config ../config/

  widget:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: widget
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          # Node 24 LTS. NOT 26: Node 22.4+/26 ship an experimental native
          # `localStorage` global that throws without --localstorage-file and shadows
          # jsdom's under vitest, breaking the persistence unit tests. LTS also matches
          # local dev.
          node-version: 24
          cache: npm
          cache-dependency-path: widget/package-lock.json
      - run: npm ci
      - name: Type check (tsc --strict)
        run: npm run typecheck
      - name: Unit tests (Vitest, with coverage)
        run: npm run test:coverage
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Accessibility + keyboard (Playwright + axe, T10-A/B)
        run: npm run test:a11y

  docker-build:
    runs-on: ubuntu-latest
    needs: [gateway, widget]
    permissions:
      contents: read
      packages: write   # push to ghcr.io
    env:
      REGISTRY: ghcr.io
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4

      # Only publish on branch pushes — not on PRs (fork PRs get no write token, and
      # PR builds should not publish images). PRs still build via the matrix below.
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tags: always the commit sha; a v* tag push additionally gets full/major.minor
      # semver tags (consumed by release.yml); `latest` only moves on the default
      # branch, so a feature-branch push never clobbers it.
      - name: Docker metadata (gateway)
        id: meta-gateway
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/gateway
          tags: |
            type=sha
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build (and push on branch/tag pushes) gateway
        uses: docker/build-push-action@v7
        with:
          context: ./gateway
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-gateway.outputs.tags }}
          labels: ${{ steps.meta-gateway.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker metadata (widget)
        id: meta-widget
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/widget
          tags: |
            type=sha
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build (and push on branch/tag pushes) widget
        uses: docker/build-push-action@v7
        with:
          context: ./widget
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-widget.outputs.tags }}
          labels: ${{ steps.meta-widget.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
