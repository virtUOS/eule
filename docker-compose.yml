# Local/reference deployment (docs/07-deployment.md). Three containers:
#   gateway  — FastAPI SSE gateway (talks to EXTERNAL vLLM / MCP / Keycloak by URL)
#   widget   — static server for the built widget.js (swappable for self-hosted S3)
#   caddy    — reverse proxy + TLS: /api/* → gateway, everything else → widget
#
# vLLM, the MCP servers, and Keycloak run elsewhere — they are URLs in config/*.yaml,
# not services here. Secrets come from .env (see .env.example).
#
# Images are fully qualified. gateway/widget come from GHCR (published by CI on every
# push to main; pin a release with EULE_IMAGE_TAG in .env). The `build:` entries stay
# for local development: `docker compose up --build` builds from source instead.
services:
  gateway:
    image: ghcr.io/virtuos/eule/gateway:${EULE_IMAGE_TAG:-latest}
    build: ./gateway
    env_file: .env
    environment:
      CONFIG_DIR: /config
    volumes:
      - ./config:/config:ro   # config is mounted, not baked → restart to reload
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/healthz').status==200 else sys.exit(1)"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  widget:
    image: ghcr.io/virtuos/eule/widget:${EULE_IMAGE_TAG:-latest}
    build: ./widget
    expose:
      - "80"
    healthcheck:
      # Checks the ARTIFACT, not just nginx: try_files 404s if widget.js is missing
      # from the image, so a broken build fails the healthcheck. wget = busybox,
      # present in nginx:alpine.
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost/widget.js"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  caddy:
    image: docker.io/library/caddy:2-alpine
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      gateway:
        condition: service_healthy   # gateway has a healthcheck; wait for it (no 502s on boot)
      widget:
        condition: service_healthy   # widget healthcheck fetches /widget.js (artifact check)
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
